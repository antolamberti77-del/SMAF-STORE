<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <title>SMAF STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #001f3f; }
        .animate-fade { animation: fade .4s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBZM5c1zGzpQwDTYSmwHRGU8jDGNlPBNw",
            authDomain: "smaf-store.firebaseapp.com",
            projectId: "smaf-store",
            storageBucket: "smaf-store.firebasestorage.app",
            messagingSenderId: "419225713088",
            appId: "1:419225713088:web:f523b3d0df7cab6fe73025"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'smaf-store-default';

        window.state = { items: [], view: 'home', currentMacro: null, selectedProduct: null, search: '' };

        window.updateState = (obj) => {
            window.state = { ...window.state, ...obj };
            render();
        };

        // Ascolto dati da Firebase
        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'products'), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snap) => {
            window.state.items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render();
        });

        function render() {
            const s = window.state;
            const root = document.getElementById('root');
            root.innerHTML = `
                <header class="sticky top-0 z-50 bg-white border-b p-6 flex justify-between items-center">
                    <h1 class="text-4xl font-black italic cursor-pointer" onclick="updateState({view:'home'})">SMAF STORE</h1>
                    <input type="text" placeholder="CERCA..." class="border-2 border-[#001f3f] rounded-full px-5 py-2 font-bold" oninput="window.state.search=this.value; render()">
                </header>
                <main class="max-w-[1500px] mx-auto p-6">
                    ${s.view === 'home' ? homePage() : s.view === 'detail' ? detailPage() : categoryPage()}
                </main>
            `;
        }

        function homePage() {
            return `
            <div class="grid md:grid-cols-2 gap-8 animate-fade">
                <div onclick="updateState({currentMacro:'calcio', view:'category'})" class="bg-[#001f3f] text-white p-20 rounded-[40px] text-6xl font-black italic cursor-pointer">JERSEY</div>
                <div onclick="updateState({currentMacro:'brand', view:'category'})" class="bg-white border-4 border-[#001f3f] p-20 rounded-[40px] text-6xl font-black italic cursor-pointer">BRANDS</div>
            </div>`;
        }

        function categoryPage() {
            const s = window.state;
            const filtered = s.items.filter(i => i.macro === s.currentMacro && i.name?.toLowerCase().includes(s.search.toLowerCase()));
            return `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 animate-fade">
                ${filtered.map(item => `
                    <div class="cursor-pointer" onclick="window.updateState({selectedProduct: ${JSON.stringify(item).replace(/"/g, '&quot;')}, view:'detail'})">
                        <div class="aspect-[4/5] overflow-hidden rounded-[25px] bg-white shadow-lg mb-4">
                            <img src="${item.imgs?.[0]}" referrerpolicy="no-referrer" class="w-full h-full object-cover hover:scale-105 transition duration-500">
                        </div>
                        <h3 class="text-xs font-black uppercase italic truncate">${item.name}</h3>
                        <p class="text-2xl font-black text-[#001f3f]">€ ${item.price}</p>
                    </div>
                `).join('')}
            </div>`;
        }

        function detailPage() {
            const p = window.state.selectedProduct;
            return `
            <div class="animate-fade flex flex-col lg:flex-row gap-12">
                <div class="lg:w-1/2">
                    <img src="${p.imgs?.[0]}" referrerpolicy="no-referrer" class="w-full rounded-[40px] shadow-2xl">
                </div>
                <div class="lg:w-1/2 flex flex-col justify-center">
                    <h2 class="text-6xl font-black italic uppercase mb-6">${p.name}</h2>
                    <p class="text-5xl font-black text-[#10b981] mb-8">€ ${p.price}</p>
                    <div class="bg-white p-8 rounded-[30px] shadow mb-8">${p.desc || ''}</div>
                    <button class="bg-[#001f3f] text-white py-6 rounded-[20px] text-xl font-black">ORDINA ORA</button>
                </div>
            </div>`;
        }

        render();
    </script>
</body>
</html>
