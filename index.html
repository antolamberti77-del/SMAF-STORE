<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SMAF STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #001f3f; }
        .animate-fade-in { animation: fadeIn .4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBZM5c1zGzpQwDTYSmwHRGU8jDGNlPBNw",
            authDomain: "smaf-store.firebaseapp.com",
            projectId: "smaf-store",
            storageBucket: "smaf-store.firebasestorage.app",
            messagingSenderId: "419225713088",
            appId: "1:419225713088:web:f523b3d0df7cab6fe73025"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'smaf-store-default';

        window.state = { items: [], view: 'home', currentMacro: null, selectedProduct: null, searchTerm: '' };

        window.updateState = (obj) => {
            window.state = { ...window.state, ...obj };
            render();
        };

        window.selectProduct = (id) => {
            const product = window.state.items.find(p => p.id === id);
            if (product) window.updateState({ selectedProduct: product, view: 'detail' });
        };

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snap) => {
            window.state.items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        function render() {
            const s = window.state;
            document.getElementById('root').innerHTML = `
                <header class="mt-4 mx-4 p-6 flex justify-between items-center border-2 border-[#001f3f] rounded-[30px] bg-white sticky top-4 z-50 shadow-xl">
                    <h1 class="text-3xl font-black italic uppercase cursor-pointer" onclick="updateState({view:'home'})">SMAF STORE</h1>
                    <input type="text" placeholder="CERCA..." class="border-2 border-[#001f3f] rounded-full px-4 py-1 text-xs font-black" oninput="window.state.searchTerm=this.value; render()">
                </header>
                <main class="max-w-[1400px] mx-auto px-6 mt-10">
                    ${s.view === 'home' ? homePage() : s.view === 'detail' ? detailPage() : categoryPage()}
                </main>
            `;
            lucide.createIcons();
        }

        function homePage() {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-in">
                <div onclick="updateState({currentMacro:'calcio', view:'category'})" class="p-20 rounded-[40px] bg-[#001f3f] text-white text-5xl font-black italic uppercase cursor-pointer">JERSEY</div>
                <div onclick="updateState({currentMacro:'brand', view:'category'})" class="p-20 rounded-[40px] bg-white border-4 border-[#001f3f] text-5xl font-black italic uppercase cursor-pointer">BRANDS</div>
            </div>`;
        }

        function categoryPage() {
            const s = window.state;
            const filtered = s.items.filter(i => i.macro === s.currentMacro && i.name.toLowerCase().includes(s.searchTerm.toLowerCase()));
            return `<div class="grid grid-cols-2 lg:grid-cols-4 gap-8 animate-fade-in">
                ${filtered.map(item => `
                    <div class="cursor-pointer" onclick="window.selectProduct('${item.id}')">
                        <div class="aspect-[4/5] rounded-[25px] overflow-hidden border-2 border-gray-100 mb-4">
                            <img src="${item.imgs?.[0] || ''}" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-xs font-black uppercase italic truncate">${item.name}</h3>
                        <p class="text-xl font-black text-[#001f3f]">€ ${item.price}</p>
                    </div>
                `).join('')}
            </div>`;
        }

        function detailPage() {
            const p = window.state.selectedProduct;
            return `<div class="animate-fade-in flex flex-col lg:flex-row gap-12">
                <div class="lg:w-1/2"><img src="${p.imgs?.[0] || ''}" referrerpolicy="no-referrer" class="w-full rounded-[40px] shadow-2xl"></div>
                <div class="lg:w-1/2">
                    <h2 class="text-5xl font-black uppercase italic mb-6">${p.name}</h2>
                    <p class="text-4xl font-black mb-8 text-[#10b981]">€ ${p.price}</p>
                    <div class="p-6 bg-white border-2 border-gray-100 rounded-2xl mb-8">${p.desc}</div>
                    <button class="w-full bg-[#001f3f] text-white py-6 rounded-2xl font-black text-xl">ORDINA ORA</button>
                </div>
            </div>`;
        }
        render();
    </script>
</body>
</html>
