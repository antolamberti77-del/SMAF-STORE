<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Apparel Store</title>
    <!-- Tailwind CSS per lo stile moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons per le icone -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            color: #001f3f;
            margin: 0;
        }

        .font-heavy { font-weight: 1000; }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        ::selection {
            background: #001f3f;
            color: white;
        }
    </style>
</head>
<body class="pb-20">

    <div id="root"></div>

    <script>
        // --- CONFIGURAZIONE ---
        const CATEGORY_MAP = {
            'calcio': ['Serie A', 'Premier League', 'La Liga', 'Ligue 1', 'Champions League', 'Nazionali'],
            'brand': ['Nike', 'Adidas', 'Ralph Lauren', 'Stone Island', 'Lacoste']
        };

        const ADMIN_PASSWORD = "15m09c20@";
        const STORAGE_KEY = 'elite_apparel_data';

        // --- DATI INIZIALI (Se il database locale è vuoto) ---
        const INITIAL_ITEMS = [
            {
                id: '1',
                name: 'JERSEY MILAN HOME 24/25',
                price: '89.99',
                macro: 'calcio',
                sub: 'Serie A',
                desc: 'La nuova maglia home del Milan per la stagione 2024/2025. Design iconico a strisce rossonere.',
                imgs: ['https://images.unsplash.com/photo-1624365160322-835692631566?w=800']
            }
        ];

        // --- STATO DELL'APP ---
        let state = {
            items: [], // Verrà popolato dal LocalStorage
            view: 'home',
            currentMacro: null,
            currentSub: 'all',
            selectedProduct: null,
            showAdmin: false,
            isAdminAuthenticated: false,
            passwordInput: '',
            loginError: false,
            searchTerm: '',
            formData: { name: '', price: '', macro: '', sub: '', desc: '', imgs: [''] }
        };

        // --- FUNZIONI DI PERSISTENZA (LOCAL STORAGE) ---
        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                state.items = JSON.parse(savedData);
            } else {
                state.items = INITIAL_ITEMS;
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
        }

        // --- GESTIONE STATO ---
        function updateState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- LOGICA ADMIN ---
        function handleLogin(e) {
            e.preventDefault();
            if (state.passwordInput === ADMIN_PASSWORD) {
                updateState({ isAdminAuthenticated: true, loginError: false, passwordInput: '' });
            } else {
                updateState({ loginError: true });
            }
        }

        function handleLogout() {
            updateState({ isAdminAuthenticated: false, showAdmin: false, passwordInput: '' });
        }

        function handleDelete(id) {
            if (confirm("Eliminare definitivamente questo prodotto?")) {
                state.items = state.items.filter(i => i.id !== id);
                saveData(); // Salva dopo l'eliminazione
                updateState({});
            }
        }

        function handleAddProduct(e) {
            e.preventDefault();
            const validImgs = state.formData.imgs.filter(img => img.trim() !== '');
            if (validImgs.length === 0) return;

            const newProduct = {
                ...state.formData,
                id: Date.now().toString(),
                name: state.formData.name.toUpperCase(),
                imgs: validImgs
            };

            state.items.push(newProduct);
            saveData(); // Salva nel browser
            
            updateState({
                formData: { name: '', price: '', macro: '', sub: '', desc: '', imgs: [''] },
                showAdmin: false
            });
        }

        // --- MOTORE DI RENDERING ---
        function render() {
            const root = document.getElementById('root');
            root.innerHTML = '';

            const header = `
                <header class="mt-4 mx-4 md:mx-10 p-5 md:p-8 flex justify-between items-center max-w-[1600px] xl:mx-auto border-[2px] border-[#001f3f] rounded-[30px] bg-white shadow-sm sticky top-4 z-50">
                    <h1 class="text-3xl md:text-5xl font-[1000] tracking-[-0.08em] cursor-pointer leading-none uppercase" onclick="updateState({view: 'home', currentMacro: null, searchTerm: ''})">
                        ELITE APPAREL
                    </h1>
                    <button onclick="updateState({showAdmin: !state.showAdmin})" 
                            class="px-6 py-3 rounded-full font-black uppercase text-[10px] transition-all flex items-center gap-2 ${state.showAdmin ? 'bg-red-500 text-white' : 'bg-[#001f3f] text-white hover:bg-black'}">
                        <i data-lucide="${state.isAdminAuthenticated ? 'log-out' : 'lock'}" class="w-4 h-4"></i>
                        ${state.showAdmin ? 'CHIUDI' : 'ADMIN'}
                    </button>
                </header>
            `;

            let mainContent = '<main class="max-w-[1600px] mx-auto px-6 md:px-10">';

            if (state.showAdmin) {
                mainContent += `
                    <section class="mt-6 animate-fade-in">
                        <div class="bg-gray-50 p-8 border-[2px] border-[#001f3f] rounded-[40px] shadow-xl">
                            ${!state.isAdminAuthenticated ? `
                                <div class="max-w-md mx-auto py-10 text-center">
                                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-4">Accesso Admin</h2>
                                    <form onsubmit="handleLogin(event)" class="flex flex-col gap-4">
                                        <input type="password" placeholder="PASSWORD" 
                                               class="p-5 border-[2px] rounded-[20px] font-bold text-center outline-none ${state.loginError ? 'border-red-500 bg-red-50' : 'border-gray-200'}"
                                               oninput="state.passwordInput = this.value">
                                        <button type="submit" class="bg-[#001f3f] text-white p-5 rounded-[20px] font-black uppercase">Entra</button>
                                    </form>
                                </div>
                            ` : `
                                <div class="flex justify-between mb-8 items-center border-b pb-6">
                                    <h2 class="text-3xl font-black uppercase tracking-tighter">Nuovo Articolo</h2>
                                    <button onclick="handleLogout()" class="text-red-500 font-black text-[10px] uppercase">Esci</button>
                                </div>
                                <form onsubmit="handleAddProduct(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="flex flex-col gap-4">
                                        <input placeholder="NOME" class="p-5 border-2 rounded-[20px] font-bold uppercase" oninput="state.formData.name = this.value" required>
                                        <input placeholder="PREZZO €" class="p-5 border-2 rounded-[20px] font-bold uppercase" oninput="state.formData.price = this.value" required>
                                        <select class="p-5 border-2 rounded-[20px] font-bold uppercase bg-white" onchange="state.formData.macro = this.value; render()" required>
                                            <option value="">MACRO CATEGORIA</option>
                                            <option value="calcio">CALCIO</option>
                                            <option value="brand">BRAND</option>
                                        </select>
                                        <select class="p-5 border-2 rounded-[20px] font-bold uppercase bg-white" onchange="state.formData.sub = this.value" required ${!state.formData.macro ? 'disabled' : ''}>
                                            <option value="">SOTTO CATEGORIA</option>
                                            ${state.formData.macro ? CATEGORY_MAP[state.formData.macro].map(s => `<option value="${s}">${s}</option>`).join('') : ''}
                                        </select>
                                    </div>
                                    <div class="flex flex-col gap-4">
                                        <textarea placeholder="DESCRIZIONE" class="p-5 border-2 rounded-[20px] font-bold uppercase" rows="3" oninput="state.formData.desc = this.value" required></textarea>
                                        <input placeholder="URL IMMAGINE" class="p-5 border-2 rounded-[20px] font-bold" oninput="state.formData.imgs[0] = this.value" required>
                                        <button type="submit" class="bg-[#001f3f] text-white p-6 font-black uppercase rounded-[25px]">Salva Articolo</button>
                                    </div>
                                </form>
                            `}
                        </div>
                    </section>
                `;
            }

            if (state.view === 'home') {
                mainContent += `
                    <div class="py-8 animate-fade-in">
                        <div class="relative h-[450px] md:h-[600px] bg-[#001f3f] mb-10 overflow-hidden flex items-end p-10 rounded-[50px] border-[2px] border-[#001f3f]">
                            <div class="absolute inset-0 grayscale opacity-20 bg-[url('https://images.unsplash.com/photo-1551232864-3f0890e580d9?w=1200')] bg-cover bg-center"></div>
                            <div class="z-10">
                                <h2 class="text-7xl md:text-[11rem] font-black text-white leading-[0.8] uppercase tracking-[-0.08em] mb-4">ARCHIVE<br>22—25</h2>
                                <span class="bg-white text-[#001f3f] px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest italic">DATI SALVATI NEL BROWSER</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div onclick="updateState({currentMacro: 'calcio', view: 'category', currentSub: 'all'})" class="group cursor-pointer border-[2px] border-[#001f3f] p-12 rounded-[40px] hover:bg-[#001f3f] hover:text-white transition-all bg-white">
                                <h3 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none">KIT</h3>
                                <div class="text-sm font-black uppercase mt-4 opacity-40">CALCIO SELECTION</div>
                            </div>
                            <div onclick="updateState({currentMacro: 'brand', view: 'category', currentSub: 'all'})" class="group cursor-pointer border-[2px] border-[#001f3f] p-12 rounded-[40px] hover:bg-[#001f3f] hover:text-white transition-all bg-white">
                                <h3 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none">BRAND</h3>
                                <div class="text-sm font-black uppercase mt-4 opacity-40">STREETWEAR LUXURY</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.view === 'category') {
                const filtered = state.items.filter(item => {
                    const macroMatch = item.macro === state.currentMacro;
                    const subMatch = state.currentSub === 'all' || item.sub === state.currentSub;
                    const searchMatch = item.name.toLowerCase().includes(state.searchTerm.toLowerCase());
                    return macroMatch && subMatch && searchMatch;
                });

                mainContent += `
                    <div class="py-8 animate-fade-in">
                        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                            <div class="w-full">
                                <button onclick="updateState({view: 'home'})" class="font-black uppercase text-[10px] mb-6 flex items-center gap-2 bg-gray-100 px-5 py-2 rounded-full w-fit">
                                    <i data-lucide="home" class="w-3 h-3"></i> HOME
                                </button>
                                <h2 class="text-6xl md:text-[9rem] font-black uppercase tracking-tighter leading-none">${state.currentMacro}</h2>
                            </div>
                            <div class="w-full md:w-[400px] relative">
                                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                                <input placeholder="CERCA..." class="w-full border-2 border-gray-200 rounded-[25px] p-5 pl-14 text-xl font-black uppercase outline-none focus:border-[#001f3f]" 
                                       value="${state.searchTerm}" oninput="state.searchTerm = this.value; render()">
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-3 mb-16">
                            ${['all', ...CATEGORY_MAP[state.currentMacro]].map(s => `
                                <button onclick="updateState({currentSub: '${s}'})" class="px-8 py-3 font-black uppercase text-[10px] border-2 border-[#001f3f] rounded-full transition-all ${state.currentSub === s ? 'bg-[#001f3f] text-white scale-105' : 'bg-white hover:bg-gray-50'}">
                                    ${s}
                                </button>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-10">
                            ${filtered.map(item => `
                                <div class="group relative cursor-pointer" onclick='updateState({selectedProduct: ${JSON.stringify(item).replace(/'/g, "&apos;")}, view: "detail"})'>
                                    ${state.isAdminAuthenticated ? `<button onclick="event.stopPropagation(); handleDelete('${item.id}')" class="absolute top-4 right-4 z-20 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                                    <div class="aspect-[3/4] overflow-hidden border-2 border-gray-100 rounded-[35px] mb-5 relative bg-gray-50">
                                        <img src="${item.imgs[0]}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                        <div class="absolute top-5 left-5 bg-[#001f3f] text-white px-4 py-1 font-black text-[9px] uppercase rounded-full">${item.sub}</div>
                                    </div>
                                    <h3 class="text-2xl font-black uppercase tracking-tighter mb-1">${item.name}</h3>
                                    <p class="text-lg font-black italic text-gray-300">€ ${item.price}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'detail' && state.selectedProduct) {
                const p = state.selectedProduct;
                mainContent += `
                    <div class="py-12 animate-fade-in">
                        <button onclick="updateState({view: 'category'})" class="mb-10 font-black uppercase text-[10px] flex items-center gap-2 bg-gray-50 px-6 py-3 rounded-full border border-gray-200">
                            <i data-lucide="chevron-left" class="w-4 h-4"></i> TORNA ALLA GALLERY
                        </button>
                        <div class="flex flex-col lg:flex-row gap-16">
                            <div class="w-full lg:w-3/5 border-2 border-gray-100 aspect-square overflow-hidden rounded-[50px] bg-gray-50">
                                <img src="${p.imgs[0]}" class="w-full h-full object-cover">
                            </div>
                            <div class="w-full lg:w-2/5 flex flex-col justify-center">
                                <span class="text-gray-300 font-black text-sm uppercase mb-4">${p.sub}</span>
                                <h2 class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-[0.8] mb-8">${p.name}</h2>
                                <p class="text-6xl font-black italic text-[#001f3f] mb-12">€ ${p.price}</p>
                                <div class="bg-gray-50 p-10 border-l-[10px] border-[#001f3f] rounded-[30px] mb-10">
                                    <p class="text-xl font-black italic text-gray-700 leading-tight">${p.desc}</p>
                                </div>
                                <button class="w-full bg-[#001f3f] text-white py-10 text-2xl font-black uppercase rounded-[30px] shadow-xl">ORDINA ORA</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            mainContent += '</main>';
            root.innerHTML = header + mainContent;
            lucide.createIcons();
        }

        // --- AVVIO ---
        window.onload = () => {
            loadData(); // Carica dal LocalStorage all'avvio
            render();
        };
    </script>
</body>
</html>
