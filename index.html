<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Apparel Store | Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            color: #001f3f;
            margin: 0;
            overflow-x: hidden;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #001f3f;
            color: white;
            padding: 16px 30px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .img-zoom:hover img { transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #001f3f;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <div id="toast" class="toast">Azione Completata</div>
    <div id="root">
        <div class="flex items-center justify-center h-screen flex-col">
            <div class="loader"></div>
            <p class="mt-4 font-black uppercase text-xs tracking-widest">Verifica Connessione Cloud...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GESTIONE CONFIGURAZIONE ---
        let firebaseConfig = null;
        try {
            // Cerchiamo di leggere la configurazione iniettata dall'ambiente
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const parsed = JSON.parse(__firebase_config);
                if (parsed && parsed.apiKey) {
                    firebaseConfig = parsed;
                }
            }
        } catch (e) {
            console.error("Errore lettura config:", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'elite-store-prod';
        
        let app, auth, db;
        let isCloudActive = false;

        // Inizializzazione solo se abbiamo i dati necessari
        if (firebaseConfig) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isCloudActive = true;
            } catch (e) {
                console.error("Firebase Init Error:", e);
                isCloudActive = false;
            }
        }

        // --- STATO ---
        window.state = {
            items: [],
            view: 'home',
            currentMacro: null,
            currentSub: 'all',
            selectedProduct: null,
            showAdmin: false,
            isAdminAuthenticated: false,
            passwordInput: '',
            loginError: false,
            isCloud: isCloudActive,
            formData: { name: '', price: '', macro: '', sub: '', desc: '', imgs: [''] }
        };

        const CATEGORY_MAP = {
            'calcio': ['Serie A', 'Premier League', 'La Liga', 'Ligue 1', 'Champions League', 'Nazionali'],
            'brand': ['Nike', 'Adidas', 'Ralph Lauren', 'Stone Island', 'Lacoste']
        };

        const ADMIN_PASSWORD = "15m09c20@"; // Password sincronizzata

        // --- UTILS ---
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(t) {
                t.innerText = msg;
                t.style.display = 'block';
                setTimeout(() => { t.style.display = 'none'; }, 3000);
            }
        };

        window.updateState = (newState) => {
            window.state = { ...window.state, ...newState };
            render();
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            if (window.state.passwordInput === ADMIN_PASSWORD) {
                window.updateState({ isAdminAuthenticated: true, loginError: false });
                window.showToast("Accesso Eseguito");
            } else {
                window.updateState({ loginError: true });
            }
        };

        window.handleAddProduct = async (e) => {
            e.preventDefault();
            const s = window.state;
            
            const newItem = {
                name: s.formData.name.toUpperCase(),
                price: s.formData.price,
                macro: s.formData.macro,
                sub: s.formData.sub,
                desc: s.formData.desc,
                imgs: s.formData.imgs.filter(u => u.trim() !== ''),
                createdAt: Date.now()
            };

            if (isCloudActive && auth.currentUser) {
                try {
                    const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                    await addDoc(dataCol, newItem);
                    window.showToast("Salvato nel Cloud");
                } catch (err) {
                    window.showToast("Errore Cloud - Prova a ricaricare");
                }
            } else {
                const demoItems = [...s.items, { ...newItem, id: Date.now().toString() }];
                window.updateState({ items: demoItems });
                window.showToast("Salvato in Locale (DEMO)");
            }

            window.updateState({ 
                showAdmin: false, 
                formData: { name: '', price: '', macro: '', sub: '', desc: '', imgs: [''] } 
            });
        };

        window.handleDelete = async (id) => {
            if (!confirm("Eliminare il prodotto?")) return;
            
            if (isCloudActive) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
                    window.showToast("Rimosso dal Cloud");
                } catch (err) { window.showToast("Errore eliminazione"); }
            } else {
                const filtered = window.state.items.filter(i => i.id !== id);
                window.updateState({ items: filtered });
                window.showToast("Rimosso localmente");
            }
        };

        // --- RENDER ---
        function render() {
            const root = document.getElementById('root');
            if(!root) return;
            const s = window.state;

            const header = `
                <header class="mt-4 mx-4 md:mx-10 p-5 md:p-8 flex justify-between items-center max-w-[1600px] xl:mx-auto border-[2px] border-[#001f3f] rounded-[30px] bg-white shadow-sm sticky top-4 z-50">
                    <h1 class="text-3xl md:text-5xl font-[1000] tracking-[-0.08em] cursor-pointer leading-none uppercase" onclick="updateState({view: 'home', currentMacro: null})">
                        ELITE APPAREL
                    </h1>
                    <div class="flex items-center gap-4">
                        <div class="flex flex-col items-end mr-2">
                            <span class="text-[9px] font-black uppercase tracking-widest ${s.isCloud ? 'text-green-500' : 'text-red-400'}">
                                ${s.isCloud ? '● Cloud Online' : '○ Modalità Demo'}
                            </span>
                        </div>
                        <button onclick="updateState({showAdmin: !window.state.showAdmin})" 
                                class="px-6 py-3 rounded-full font-black uppercase text-[10px] transition-all flex items-center gap-2 ${s.showAdmin ? 'bg-red-500 text-white' : 'bg-[#001f3f] text-white hover:bg-black'}">
                            <i data-lucide="${s.isAdminAuthenticated ? 'log-out' : 'lock'}" class="w-4 h-4"></i>
                            ${s.showAdmin ? 'CHIUDI' : 'ADMIN'}
                        </button>
                    </div>
                </header>
            `;

            let content = '<main class="max-w-[1600px] mx-auto px-6 md:px-10 min-h-[70vh]">';

            if (s.showAdmin) {
                content += `
                    <div class="mt-6 p-8 bg-gray-50 border-2 border-[#001f3f] rounded-[40px] animate-fade-in shadow-xl">
                        ${!s.isAdminAuthenticated ? `
                            <div class="max-w-md mx-auto text-center py-10">
                                <h2 class="text-3xl font-black uppercase mb-6 italic">Pannello Admin</h2>
                                <form onsubmit="handleLogin(event)" class="flex flex-col gap-4">
                                    <input type="password" placeholder="PASSWORD" class="p-5 border-2 rounded-[20px] font-bold text-center outline-none ${s.loginError ? 'border-red-500 bg-red-50' : 'border-gray-200 focus:border-[#001f3f]'}" oninput="window.state.passwordInput = this.value">
                                    <button type="submit" class="bg-[#001f3f] text-white p-5 rounded-[20px] font-black uppercase hover:bg-black">Entra</button>
                                </form>
                            </div>
                        ` : `
                            <div class="flex justify-between items-center mb-8 border-b-2 border-gray-100 pb-6">
                                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Nuovo Prodotto</h2>
                                <button onclick="updateState({isAdminAuthenticated: false})" class="text-red-500 font-black text-[10px] uppercase bg-white px-4 py-2 rounded-full border border-red-200 hover:bg-red-50">Logout</button>
                            </div>
                            <form onsubmit="handleAddProduct(event)" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div class="flex flex-col gap-4">
                                    <input placeholder="NOME ARTICOLO" class="p-5 border-2 rounded-[20px] font-bold uppercase outline-none focus:border-[#001f3f]" oninput="window.state.formData.name = this.value" required>
                                    <input placeholder="PREZZO (€)" class="p-5 border-2 rounded-[20px] font-bold outline-none focus:border-[#001f3f]" oninput="window.state.formData.price = this.value" required>
                                    <select class="p-5 border-2 rounded-[20px] font-bold uppercase bg-white outline-none" onchange="window.state.formData.macro = this.value; render()" required>
                                        <option value="">CATEGORIA</option>
                                        <option value="calcio">CALCIO</option>
                                        <option value="brand">BRAND</option>
                                    </select>
                                    <select class="p-5 border-2 rounded-[20px] font-bold uppercase bg-white outline-none" onchange="window.state.formData.sub = this.value" required ${!s.formData.macro ? 'disabled' : ''}>
                                        <option value="">SOTTO-CATEGORIA</option>
                                        ${s.formData.macro ? CATEGORY_MAP[s.formData.macro].map(sub => `<option value="${sub}">${sub}</option>`).join('') : ''}
                                    </select>
                                </div>
                                <div class="bg-white p-6 rounded-[30px] border-2 border-gray-100 flex flex-col gap-4">
                                    <textarea placeholder="DESCRIZIONE DETTAGLIATA" class="p-5 border-2 rounded-[20px] font-bold outline-none focus:border-[#001f3f]" oninput="window.state.formData.desc = this.value" required></textarea>
                                    <input placeholder="LINK IMMAGINE (URL)" class="p-5 border-2 rounded-[20px] font-bold outline-none focus:border-[#001f3f]" oninput="window.state.formData.imgs[0] = this.value" required>
                                    <button type="submit" class="bg-[#001f3f] text-white p-6 font-black uppercase rounded-[20px] hover:bg-black transition-all shadow-lg">Aggiungi al Catalogo</button>
                                </div>
                            </form>
                        `}
                    </div>
                `;
            }

            if (s.view === 'home') {
                content += `
                    <div class="py-8 animate-fade-in">
                        <div class="relative h-[450px] md:h-[600px] bg-[#001f3f] mb-10 overflow-hidden flex items-end p-10 rounded-[50px] border-[2px] border-[#001f3f]">
                            <div class="absolute inset-0 grayscale opacity-10 bg-[url('https://images.unsplash.com/photo-1551232864-3f0890e580d9?w=1200')] bg-cover bg-center"></div>
                            <div class="z-10 w-full text-white">
                                <h2 class="text-6xl md:text-[10rem] font-black leading-[0.8] uppercase tracking-[-0.08em] mb-4">COLLECTION<br>ARCHIVE</h2>
                                <p class="text-xs font-black uppercase tracking-[0.4em] opacity-40">Elite Apparel Store — 2025</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div onclick="updateState({currentMacro: 'calcio', view: 'category', currentSub: 'all'})" class="group border-[2px] border-[#001f3f] p-12 rounded-[40px] bg-white transition-all hover:bg-[#001f3f] hover:text-white cursor-pointer">
                                <h3 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none group-hover:-translate-y-1 transition-transform">KIT</h3>
                                <p class="text-[10px] font-black uppercase mt-4 opacity-40 tracking-widest">Jersey Calcio</p>
                            </div>
                            <div onclick="updateState({currentMacro: 'brand', view: 'category', currentSub: 'all'})" class="group border-[2px] border-[#001f3f] p-12 rounded-[40px] bg-white transition-all hover:bg-[#001f3f] hover:text-white cursor-pointer">
                                <h3 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none group-hover:-translate-y-1 transition-transform">BRAND</h3>
                                <p class="text-[10px] font-black uppercase mt-4 opacity-40 tracking-widest">Streetwear Luxury</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (s.view === 'category') {
                const filtered = s.items.filter(i => i.macro === s.currentMacro && (s.currentSub === 'all' || i.sub === s.currentSub));
                content += `
                    <div class="py-8 animate-fade-in">
                        <div class="mb-10">
                            <button onclick="updateState({view: 'home'})" class="font-black uppercase text-[10px] mb-6 flex items-center gap-2 bg-gray-50 px-6 py-2 rounded-full w-fit hover:bg-black hover:text-white">
                                <i data-lucide="home" class="w-4 h-4"></i> HOME
                            </button>
                            <h2 class="text-5xl md:text-[8rem] font-black uppercase tracking-tighter leading-none">${s.currentMacro}</h2>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-12">
                            ${['all', ...CATEGORY_MAP[s.currentMacro]].map(sub => `
                                <button onclick="updateState({currentSub: '${sub}'})" class="px-8 py-3 font-black uppercase text-[10px] tracking-widest border-2 border-[#001f3f] rounded-full ${s.currentSub === sub ? 'bg-[#001f3f] text-white' : 'bg-white hover:bg-gray-50'}">
                                    ${sub}
                                </button>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-8">
                            ${filtered.map(item => `
                                <div class="group relative cursor-pointer" onclick='updateState({selectedProduct: ${JSON.stringify(item).replace(/'/g, "&apos;")}, view: "detail"})'>
                                    ${s.isAdminAuthenticated ? `<button onclick="event.stopPropagation(); handleDelete('${item.id}')" class="absolute top-4 right-4 z-20 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                                    <div class="aspect-[3/4] overflow-hidden border-2 border-gray-100 rounded-[30px] mb-4 relative bg-gray-50">
                                        <img src="${item.imgs[0]}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/400x600?text=Immagine+Non+Valida'">
                                        <div class="absolute top-4 left-4 bg-white/90 px-3 py-1 font-black text-[8px] uppercase rounded-full shadow-sm">${item.sub}</div>
                                    </div>
                                    <h3 class="text-xl font-black uppercase tracking-tighter leading-tight">${item.name}</h3>
                                    <p class="text-lg font-black italic text-[#001f3f]/40">€ ${item.price}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (s.view === 'detail' && s.selectedProduct) {
                const p = s.selectedProduct;
                content += `
                    <div class="py-12 animate-fade-in">
                        <button onclick="updateState({view: 'category'})" class="mb-10 font-black uppercase text-[10px] flex items-center gap-2 bg-gray-50 px-6 py-3 rounded-full border border-gray-200">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> GALLERY
                        </button>
                        <div class="flex flex-col lg:flex-row gap-16">
                            <div class="w-full lg:w-3/5">
                                <div class="aspect-square border-2 border-gray-100 overflow-hidden rounded-[50px] bg-gray-50">
                                    <img src="${p.imgs[0]}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x800?text=Anteprima+Non+Disponibile'">
                                </div>
                            </div>
                            <div class="w-full lg:w-2/5 flex flex-col justify-center">
                                <span class="text-gray-300 font-black text-xs uppercase mb-4 tracking-[0.3em]">${p.sub}</span>
                                <h2 class="text-6xl md:text-7xl font-black uppercase tracking-tighter leading-[0.8] mb-8">${p.name}</h2>
                                <p class="text-6xl font-black italic text-[#001f3f] mb-10 tracking-tighter">€ ${p.price}</p>
                                <div class="bg-gray-50 p-10 border-l-[10px] border-[#001f3f] rounded-[30px] mb-10">
                                    <p class="text-xl font-black italic text-gray-700 leading-tight">${p.desc}</p>
                                </div>
                                <button class="w-full bg-[#001f3f] text-white py-10 text-2xl font-black uppercase rounded-[30px] hover:bg-black transition-all shadow-xl active:scale-95">ACQUISTA ORA</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            content += '</main>';
            root.innerHTML = header + content;
            lucide.createIcons();
        }

        // --- INIZIO ---
        const init = async () => {
            if (isCloudActive) {
                try {
                    // 1. Auth prioritario
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    // 2. Listener dati
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            const dataCol = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                            onSnapshot(dataCol, (snap) => {
                                const items = [];
                                snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                                window.updateState({ items });
                            }, (err) => {
                                console.error("Firestore Error:", err);
                                useDemoData();
                            });
                        }
                    });
                } catch (e) {
                    console.error("Auth Fail:", e);
                    window.updateState({ isCloud: false });
                    useDemoData();
                }
            } else {
                useDemoData();
            }
        };

        function useDemoData() {
            window.updateState({ 
                items: [
                    { id: 'd1', name: 'Jersey Milan 24/25', price: '95', macro: 'calcio', sub: 'Serie A', desc: 'Versione Demo Offline - Maglia Casa Milan AC', imgs: ['https://images.unsplash.com/photo-1624365160322-835692631566?w=800'] },
                    { id: 'd2', name: 'Nike Tech Fleece', price: '120', macro: 'brand', sub: 'Nike', desc: 'Versione Demo Offline - Pantalone Tech Fleece Nero', imgs: ['https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=800'] }
                ] 
            });
        }

        window.onload = init;
        render();
    </script>
</body>
</html>
